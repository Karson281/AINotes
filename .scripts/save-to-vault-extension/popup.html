<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { width: 320px; padding: 12px; font-family: system-ui, sans-serif; }
h2 { margin: 0 0 8px; font-size: 16px; color: #7c3aed; }
label { display: block; font-size: 12px; margin: 6px 0 2px; color: #444; }
input, textarea { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
textarea { height: 60px; resize: vertical; }
button { margin-top: 10px; width: 100%; padding: 8px; background: #7c3aed; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
button:hover { background: #6d28d9; }
button:disabled { opacity: 0.6; cursor: default; }
.status { font-size: 12px; margin-top: 6px; color: #666; }
.platform { font-size: 11px; color: #999; margin-bottom: 4px; }
</style>
</head>
<body>
<h2>Save to Vault</h2>
<div class="platform" id="platform">Detecting...</div>
<label>Title</label>
<input id="title" type="text" />
<label>Tags (comma-separated)</label>
<input id="tags" type="text" placeholder="e.g. ai/perplexity, topic/python" />
<label>Content</label>
<textarea id="content"></textarea>
<button id="saveBtn">Download .md</button>
<div class="status" id="status"></div>

<script src="popup.js"></script>
</body>
</html>
