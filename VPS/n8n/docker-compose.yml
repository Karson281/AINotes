services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    container_name: n8n

    # ── Port ──
    # 127.0.0.1 only — 唔直接暴露外網，經 Traefik 或 Tailscale 訪問
    ports:
      - "127.0.0.1:5678:5678"

    # ── 環境變數 ──
    environment:
      # SQLite 係 default，唔使額外 config
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_EXECUTIONS_DATA_PRUNE=true
      - N8N_EXECUTIONS_DATA_MAX_AGE=168          # 保留 7 日 execution history
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - GENERIC_TIMEZONE=Asia/Hong_Kong
      - N8N_DEFAULT_TIMEZONE=Asia/Hong_Kong
      - N8N_METRICS=false
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true

    # ── Volume：SQLite database 持久化 ──
    volumes:
      - n8n_data:/home/node/.n8n

    # ── .env ──
    env_file:
      - /root/.env
      - .env

    # ── Network ──
    networks:
      - coolify     # 同 Traefik 同 network，可經 Traefik 出街

    # ── Traefik labels ──
    # 用 Traefik 就 uncomment 下邊嘅 labels
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.n8n.rule=Host(`${N8N_DOMAIN}`)"
    #   - "traefik.http.routers.n8n.entrypoints=https"
    #   - "traefik.http.routers.n8n.tls=true"
    #   - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.n8n.loadbalancer.server.port=5678"

volumes:
  n8n_data:
    driver: local

networks:
  coolify:
    external: true
    name: coolify
